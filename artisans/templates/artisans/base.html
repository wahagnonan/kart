<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Étude Terrain{% endblock %} — Artisans CI</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
  <style>
    body { background-color: #f5f0e8; }
    .nav-active { background-color: #b3681e; color: white; }
    .nav-link { color: #bbf7d0; }
    .nav-link:hover { background-color: #2d6a4f; }
  </style>
</head>
<body class="min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-60 bg-forest-600 flex flex-col shrink-0 min-h-screen fixed top-0 left-0 h-full z-10">
    <div class="px-5 py-6 border-b border-forest-500">
      <p class="text-xs uppercase tracking-widest text-green-300 mb-1">Étude terrain</p>
      <h1 class="text-xl font-bold leading-tight text-white" style="font-family:Georgia,serif">
        Artisans<br>
        <span class="text-earth-300">Côte d'Ivoire</span>
      </h1>
    </div>
    <nav class="flex-1 px-2 py-4 space-y-1">
      <a href="{% url 'dashboard' %}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors nav-link {% if request.resolver_match.url_name == 'dashboard' %}nav-active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Tableau de bord
      </a>
      <a href="{% url 'nouveau' %}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors nav-link {% if request.resolver_match.url_name == 'nouveau' %}nav-active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
        Nouvel artisan
      </a>
      <a href="{% url 'reponses' %}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors nav-link {% if request.resolver_match.url_name == 'reponses' %}nav-active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Réponses
      </a>
      <a href="{% url 'admin_questions' %}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors nav-link {% if request.resolver_match.url_name == 'admin_questions' %}nav-active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
        Questions
      </a>
    </nav>
    <div class="px-5 py-4 border-t border-forest-500">
      <p class="text-xs text-green-400">v1.0 · Terrain 2024</p>
    </div>
  </aside>

  <!-- Page content -->
  <main class="flex-1 ml-60 min-h-screen">
    {% if messages %}
    <div class="fixed top-4 right-4 z-50 space-y-2">
      {% for message in messages %}
      <div class="px-5 py-3 rounded-xl shadow-lg text-sm font-medium
        {% if message.tags == 'success' %}bg-green-500 text-white
        {% elif message.tags == 'error' %}bg-red-500 text-white
        {% else %}bg-earth-600 text-white{% endif %}"
        x-data="{ show: true }" style="animation: fadeout 4s forwards;">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    <style>
      @keyframes fadeout { 0%,80%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-10px)} }
    </style>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

</body>
</html>
